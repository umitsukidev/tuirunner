#:schema ./runner.schema.json

tui = true

[tasks."clean:npm"]
run = "pnpm clean"

[tasks."clean:cargo"]
run = "cargo clean"

[tasks.clean]
depends_on = ["clean:npm", "clean:cargo"]
description = "Clean build artifacts and temporary files"

[tasks."build:docs"]
run = "pnpm docs:build"
depends_on = ["codegen:schema"]

[tasks."build:bin"]
run = "cargo build"

[tasks.build]
depends_on = ["build:docs", "build:bin"]
description = "Build the application"

[tasks."run:tuirunner"]
run = "cargo run"
depends_on = ["build"]

[tasks."codegen:schema"]
description = "Generate JSON Schema for runner.config.toml"
run = [
    "cargo run -- --schema > runner.schema.json",
    "mkdir -p docs/public",
    "cp runner.schema.json docs/public/runner.schema.json",
]
