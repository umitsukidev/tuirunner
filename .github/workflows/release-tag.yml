name: Release Tag on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'release:')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            // 'release:' の後ろのセマンティックバージョン部分をキャプチャ。
            // プレリリース (-alpha, -beta.n など) にも対応しつつ、後ろのコメント等は除外する。
            const regex = /^release:\s*(v?\d+\.\d+\.\d+(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?)/;
            const match = title.match(regex);
            if (!match) {
              core.setFailed(`PR title "${title}" does not contain a valid version after "release:".`);
              return;
            }
            const version = match[1];
            core.info(`Extracted version: ${version}`);
            core.setOutput('version', version);

      - name: Create and push tag
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Trigger release workflow
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          gh workflow run release.yml --ref main -f tag="$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
